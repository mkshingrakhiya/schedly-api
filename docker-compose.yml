# `api` + `postgres` + `nginx` share the `backend` bridge (no static IPs). Use DB_HOST=postgres from the api container.
# External HTTP(S) is served by `nginx` on ports 80/443; `api` listens on 8000 inside the network only.
# If you still see errors mentioning 172.28.x.x or `db`, remove old networks: `docker compose down` then prune
# unused networks in Docker Desktop, and ensure you are in this project directory when you run compose.

services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    expose:
      - "8000"
    env_file:
      - .env
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_DATABASE: "${DB_DATABASE:-schedly}"
      DB_USERNAME: "${DB_USERNAME:-schedly}"
      DB_PASSWORD: "${DB_PASSWORD:-secret}"
    volumes:
      - .:/var/www/html
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/ssl:/etc/nginx/certs:ro
    depends_on:
      - api
    networks:
      - backend

  postgres:
    image: postgres:16-alpine
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: "${DB_DATABASE:-schedly}"
      POSTGRES_USER: "${DB_USERNAME:-schedly}"
      POSTGRES_PASSWORD: "${DB_PASSWORD:-secret}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend

networks:
  backend:
    driver: bridge

volumes:
  postgres_data:
