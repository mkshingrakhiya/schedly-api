name: CI

on:
  push:
    branches:
      - master
      - '*.x'
  pull_request:
  schedule:
    - cron: '0 0 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  # One runner: composer install once, then validate → Pint → PHPStan (fewer total minutes vs parallel jobs).
  checks:
    name: Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup reviewdog
        if: github.event_name == 'pull_request'
        uses: reviewdog/action-setup@v1
        with:
          reviewdog_version: latest

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite
          coverage: none

      - name: Validate Composer configuration
        run: composer validate --strict

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Check code style with Pint
        if: github.event_name != 'pull_request'
        run: vendor/bin/pint --test

      - name: Check code style with Pint (reviewdog)
        if: github.event_name == 'pull_request'
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ github.token }}
        run: |
          set +e
          vendor/bin/pint --test --format=checkstyle --output-to-file="${RUNNER_TEMP}/pint-checkstyle.xml" --output-format=checkstyle
          pint_exit=$?
          set -e
          if [ -f "${RUNNER_TEMP}/pint-checkstyle.xml" ]; then
            reviewdog -f=checkstyle -name=Pint -reporter=github-pr-review -filter-mode=added -fail-on-error=false < "${RUNNER_TEMP}/pint-checkstyle.xml"
          fi
          exit "${pint_exit}"

      - name: Copy environment file
        run: cp .env.example .env

      - name: Generate app key
        run: php artisan key:generate

      - name: Run PHPStan
        if: github.event_name != 'pull_request'
        run: composer run analyse --no-interaction

      - name: Run PHPStan (reviewdog)
        if: github.event_name == 'pull_request'
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ github.token }}
        run: |
          set +e
          vendor/bin/phpstan analyse --memory-limit=1G --no-progress --error-format=json > "${RUNNER_TEMP}/phpstan.json"
          stan_exit=$?
          set -e
          reviewdog -f=phpstan -name=PHPStan -reporter=github-pr-review -filter-mode=added -fail-on-error=false < "${RUNNER_TEMP}/phpstan.json" || true
          exit "${stan_exit}"

  tests:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup reviewdog
        if: github.event_name == 'pull_request'
        uses: reviewdog/action-setup@v1
        with:
          reviewdog_version: latest

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite
          coverage: pcov

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Copy environment file
        run: cp .env.example .env

      - name: Generate app key
        run: php artisan key:generate

      - name: Execute tests
        if: github.event_name != 'pull_request'
        run: php artisan test --compact --coverage --min=80

      - name: Execute tests (reviewdog)
        if: github.event_name == 'pull_request'
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ github.token }}
        run: |
          set +e
          php artisan test --compact --coverage --min=80 --log-junit "${RUNNER_TEMP}/phpunit-junit.xml"
          test_exit=$?
          set -e
          if [ -f "${RUNNER_TEMP}/phpunit-junit.xml" ]; then
            reviewdog -f=junit -name=PHPUnit -reporter=github-pr-review -filter-mode=added -fail-on-error=false < "${RUNNER_TEMP}/phpunit-junit.xml" || true
          fi
          exit "${test_exit}"

