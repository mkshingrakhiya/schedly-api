name: CI

on:
  push:
    branches:
      - master
      - '*.x'
  pull_request:
  schedule:
    - cron: '0 0 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  # One runner: composer install once, then validate → Pint → PHPStan (fewer total minutes vs parallel jobs).
  checks:
    name: Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup reviewdog
        if: github.event_name == 'pull_request'
        uses: reviewdog/action-setup@v1
        with:
          reviewdog_version: latest

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite
          coverage: none

      - name: Validate Composer configuration
        run: composer validate --strict

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Check code style with Pint
        if: github.event_name != 'pull_request'
        run: vendor/bin/pint --test

      - name: Check code style with Pint (reviewdog)
        if: github.event_name == 'pull_request'
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ github.token }}
        run: |
          set +e
          vendor/bin/pint --test --format=checkstyle --output-to-file="${RUNNER_TEMP}/pint-checkstyle.xml" --output-format=checkstyle
          pint_exit=$?
          set -e
          if [ -f "${RUNNER_TEMP}/pint-checkstyle.xml" ]; then
            reviewdog -f=checkstyle -name=Pint -reporter=github-pr-review -filter-mode=added -fail-on-error=false < "${RUNNER_TEMP}/pint-checkstyle.xml"
          fi
          exit "${pint_exit}"

      - name: Copy environment file
        run: cp .env.example .env

      - name: Generate app key
        run: php artisan key:generate

      - name: Run PHPStan
        if: github.event_name != 'pull_request'
        run: composer run analyse --no-interaction

      - name: Run PHPStan (reviewdog)
        if: github.event_name == 'pull_request'
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ github.token }}
        run: |
          set +e
          vendor/bin/phpstan analyse --memory-limit=1G --no-progress --error-format=json > "${RUNNER_TEMP}/phpstan.json"
          stan_exit=$?
          set -e
          reviewdog -f=phpstan -name=PHPStan -reporter=github-pr-review -filter-mode=added -fail-on-error=false < "${RUNNER_TEMP}/phpstan.json" || true
          exit "${stan_exit}"

  tests:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite
          coverage: pcov

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Copy environment file
        run: cp .env.example .env

      - name: Generate app key
        run: php artisan key:generate

      - name: Execute tests with coverage
        id: coverage
        run: |
          set -eo pipefail
          php artisan test --compact --coverage --min=80 | tee "${RUNNER_TEMP}/test-output.txt"

          coverage_line="$(awk 'match($0,/Total:[[:space:]]*[0-9]+(\.[0-9]+)?[[:space:]]*%/){line=substr($0,RSTART,RLENGTH)} END {print line}' "${RUNNER_TEMP}/test-output.txt")"
          if [ -n "${coverage_line}" ]; then
            coverage_percentage="$(echo "${coverage_line}" | sed -E 's/.*Total:[[:space:]]*([0-9]+(\.[0-9]+)?)[[:space:]]*%.*/\1/')"
          else
            coverage_percentage=""
          fi
          echo "coverage_percentage=${coverage_percentage}" >> "$GITHUB_OUTPUT"

      - name: Comment coverage on pull request
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- tests-coverage-comment -->';
            const coverage = '${{ steps.coverage.outputs.coverage_percentage }}';
            const body = [
              marker,
              '## Test Coverage',
              coverage
                ? `- Total coverage: **${coverage}%**`
                : '- Total coverage: **Unavailable** (coverage line not detected in test output).',
              '- Threshold enforced in CI: **80%**',
            ].join('\n');

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((comment) => comment.body && comment.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

